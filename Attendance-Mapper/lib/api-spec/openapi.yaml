openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Attendance Mapper API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: zones
  - name: employees
  - name: attendance
  - name: overtime
  - name: leaves
  - name: reports
  - name: payroll
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/HealthStatus" }

  /departments:
    get:
      operationId: listDepartments
      tags: [zones]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Department" }
    post:
      operationId: createDepartment
      tags: [zones]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateDepartmentBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Department" }

  /departments/{departmentId}:
    delete:
      operationId: deleteDepartment
      tags: [zones]
      parameters:
        - { name: departmentId, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /employees:
    get:
      operationId: listEmployees
      tags: [employees]
      parameters:
        - { name: departmentId, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Employee" }
    post:
      operationId: createEmployee
      tags: [employees]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateEmployeeBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Employee" }

  /employees/{employeeId}:
    get:
      operationId: getEmployee
      tags: [employees]
      parameters:
        - { name: employeeId, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/EmployeeDetail" }
    patch:
      operationId: updateEmployee
      tags: [employees]
      parameters:
        - { name: employeeId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateEmployeeBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Employee" }
    delete:
      operationId: deleteEmployee
      tags: [employees]
      parameters:
        - { name: employeeId, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /attendance/day:
    get:
      operationId: getDayAttendance
      tags: [attendance]
      parameters:
        - { name: date, in: query, required: true, schema: { type: string, format: date } }
        - { name: departmentId, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DayAttendance" }
    put:
      operationId: setDayAttendance
      tags: [attendance]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SetDayAttendanceBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DayAttendance" }

  /overtime:
    get:
      operationId: listOvertime
      tags: [overtime]
      parameters:
        - { name: month, in: query, required: false, schema: { type: string, description: "YYYY-MM" } }
        - { name: employeeId, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/OvertimeEntry" }
    post:
      operationId: createOvertime
      tags: [overtime]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateOvertimeBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OvertimeEntry" }

  /overtime/{overtimeId}:
    delete:
      operationId: deleteOvertime
      tags: [overtime]
      parameters:
        - { name: overtimeId, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /leaves:
    get:
      operationId: listLeaves
      tags: [leaves]
      parameters:
        - { name: status, in: query, required: false, schema: { $ref: "#/components/schemas/LeaveStatus" } }
        - { name: employeeId, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/LeaveRequest" }
    post:
      operationId: createLeave
      tags: [leaves]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateLeaveBody" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LeaveRequest" }

  /leaves/{leaveId}:
    patch:
      operationId: updateLeaveStatus
      tags: [leaves]
      parameters:
        - { name: leaveId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateLeaveStatusBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LeaveRequest" }
    delete:
      operationId: deleteLeave
      tags: [leaves]
      parameters:
        - { name: leaveId, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /leaves/balance/{employeeId}:
    get:
      operationId: getLeaveBalance
      tags: [leaves]
      parameters:
        - { name: employeeId, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LeaveBalance" }

  /reports/daily:
    get:
      operationId: getDailyReport
      tags: [reports]
      parameters:
        - { name: date, in: query, required: true, schema: { type: string, format: date } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DailyReport" }

  /reports/monthly:
    get:
      operationId: getMonthlyReport
      tags: [reports]
      parameters:
        - { name: month, in: query, required: true, schema: { type: string, description: "YYYY-MM" } }
        - { name: departmentId, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MonthlyReport" }

  /reports/absenteeism:
    get:
      operationId: getAbsenteeismReport
      tags: [reports]
      parameters:
        - { name: month, in: query, required: true, schema: { type: string, description: "YYYY-MM" } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AbsenteeismReport" }

  /reports/form12:
    get:
      operationId: getForm12Report
      tags: [reports]
      parameters:
        - { name: month, in: query, required: true, schema: { type: string, description: "YYYY-MM" } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Form12Report" }

  /payroll:
    get:
      operationId: getPayroll
      tags: [payroll]
      parameters:
        - { name: month, in: query, required: true, schema: { type: string, description: "YYYY-MM" } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PayrollReport" }

  /payroll/{employeeId}:
    put:
      operationId: updatePayrollLine
      tags: [payroll]
      parameters:
        - { name: employeeId, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdatePayrollLineBody" }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PayrollLine" }

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [reports]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DashboardSummary" }

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status: { type: string }

    AttendanceStatus:
      type: string
      enum: [present, absent, late, half_day, on_leave]

    LeaveType:
      type: string
      enum: [CL, SL, EL, LOP]

    LeaveStatus:
      type: string
      enum: [pending, approved, rejected]

    Department:
      type: object
      required: [id, name, code, displayOrder, employeeCount, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        code: { type: string, nullable: true }
        displayOrder: { type: integer }
        createdAt: { type: string, format: date-time }
        employeeCount: { type: integer }

    CreateDepartmentBody:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1 }
        code: { type: string, nullable: true }
        displayOrder: { type: integer, default: 0 }

    Employee:
      type: object
      required: [id, employeeCode, name, departmentId, departmentName, designation, monthlyWage, statsEligible, otEligible, createdAt]
      properties:
        id: { type: integer }
        employeeCode: { type: string }
        name: { type: string }
        departmentId: { type: integer }
        departmentName: { type: string }
        designation: { type: string }
        monthlyWage: { type: number }
        statsEligible: { type: boolean }
        otEligible: { type: boolean }
        createdAt: { type: string, format: date-time }

    EmployeeDetail:
      type: object
      required: [employee, monthAttendanceRate, daysPresentThisMonth, daysAbsentThisMonth, overtimeHoursThisMonth, leaveBalance]
      properties:
        employee: { $ref: "#/components/schemas/Employee" }
        monthAttendanceRate: { type: number }
        daysPresentThisMonth: { type: integer }
        daysAbsentThisMonth: { type: integer }
        overtimeHoursThisMonth: { type: number }
        leaveBalance: { $ref: "#/components/schemas/LeaveBalance" }

    CreateEmployeeBody:
      type: object
      required: [employeeCode, name, departmentId, designation]
      properties:
        employeeCode: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        departmentId: { type: integer }
        designation: { type: string, minLength: 1 }
        monthlyWage: { type: number, minimum: 0, default: 0 }
        statsEligible: { type: boolean, default: true }
        otEligible: { type: boolean, default: true }

    UpdateEmployeeBody:
      type: object
      properties:
        employeeCode: { type: string, minLength: 1 }
        name: { type: string, minLength: 1 }
        departmentId: { type: integer }
        designation: { type: string, minLength: 1 }
        monthlyWage: { type: number, minimum: 0 }
        statsEligible: { type: boolean }
        otEligible: { type: boolean }

    AttendanceEntry:
      type: object
      required: [employeeId, employeeCode, employeeName, departmentName, designation, status]
      properties:
        employeeId: { type: integer }
        employeeCode: { type: string }
        employeeName: { type: string }
        departmentName: { type: string }
        designation: { type: string }
        status: { $ref: "#/components/schemas/AttendanceStatus" }
        inTime1: { type: string, nullable: true }
        outTime1: { type: string, nullable: true }
        inTime2: { type: string, nullable: true }
        outTime2: { type: string, nullable: true }
        hoursWorked: { type: number, nullable: true }
        note: { type: string, nullable: true }

    DayAttendance:
      type: object
      required: [date, entries, summary]
      properties:
        date: { type: string, format: date }
        entries:
          type: array
          items: { $ref: "#/components/schemas/AttendanceEntry" }
        summary:
          type: object
          required: [present, absent, late, halfDay, onLeave, total]
          properties:
            present: { type: integer }
            absent: { type: integer }
            late: { type: integer }
            halfDay: { type: integer }
            onLeave: { type: integer }
            total: { type: integer }

    SetDayAttendanceBody:
      type: object
      required: [date, entries]
      properties:
        date: { type: string, format: date }
        entries:
          type: array
          items:
            type: object
            required: [employeeId, status]
            properties:
              employeeId: { type: integer }
              status: { $ref: "#/components/schemas/AttendanceStatus" }
              inTime1: { type: string, nullable: true }
              outTime1: { type: string, nullable: true }
              inTime2: { type: string, nullable: true }
              outTime2: { type: string, nullable: true }
              note: { type: string, nullable: true }

    OvertimeEntry:
      type: object
      required: [id, employeeId, employeeCode, employeeName, departmentName, date, hours, createdAt]
      properties:
        id: { type: integer }
        employeeId: { type: integer }
        employeeCode: { type: string }
        employeeName: { type: string }
        departmentName: { type: string }
        date: { type: string, format: date }
        hours: { type: number }
        reason: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }

    CreateOvertimeBody:
      type: object
      required: [employeeId, date, hours]
      properties:
        employeeId: { type: integer }
        date: { type: string, format: date }
        hours: { type: number, minimum: 0 }
        reason: { type: string, nullable: true }

    LeaveRequest:
      type: object
      required: [id, employeeId, employeeCode, employeeName, departmentName, leaveType, startDate, endDate, days, status, createdAt]
      properties:
        id: { type: integer }
        employeeId: { type: integer }
        employeeCode: { type: string }
        employeeName: { type: string }
        departmentName: { type: string }
        leaveType: { $ref: "#/components/schemas/LeaveType" }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        days: { type: integer }
        reason: { type: string, nullable: true }
        status: { $ref: "#/components/schemas/LeaveStatus" }
        createdAt: { type: string, format: date-time }

    CreateLeaveBody:
      type: object
      required: [employeeId, leaveType, startDate, endDate]
      properties:
        employeeId: { type: integer }
        leaveType: { $ref: "#/components/schemas/LeaveType" }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date }
        reason: { type: string, nullable: true }

    UpdateLeaveStatusBody:
      type: object
      required: [status]
      properties:
        status: { $ref: "#/components/schemas/LeaveStatus" }

    LeaveBalance:
      type: object
      required: [employeeId, CL, SL, EL, LOP]
      properties:
        employeeId: { type: integer }
        CL:
          type: object
          required: [allotted, used, remaining]
          properties:
            allotted: { type: number }
            used: { type: number }
            remaining: { type: number }
        SL:
          type: object
          required: [allotted, used, remaining]
          properties:
            allotted: { type: number }
            used: { type: number }
            remaining: { type: number }
        EL:
          type: object
          required: [allotted, used, remaining]
          properties:
            allotted: { type: number }
            used: { type: number }
            remaining: { type: number }
        LOP:
          type: object
          required: [used]
          properties:
            used: { type: number }

    DailyReport:
      type: object
      required: [date, totalEmployees, present, absent, late, halfDay, onLeave, attendanceRate, byDepartment]
      properties:
        date: { type: string, format: date }
        totalEmployees: { type: integer }
        present: { type: integer }
        absent: { type: integer }
        late: { type: integer }
        halfDay: { type: integer }
        onLeave: { type: integer }
        attendanceRate: { type: number }
        byDepartment:
          type: array
          items:
            type: object
            required: [departmentId, departmentName, total, present, absent, attendanceRate]
            properties:
              departmentId: { type: integer }
              departmentName: { type: string }
              total: { type: integer }
              present: { type: integer }
              absent: { type: integer }
              attendanceRate: { type: number }

    MonthlyReport:
      type: object
      required: [month, workingDays, employees]
      properties:
        month: { type: string }
        workingDays: { type: integer }
        employees:
          type: array
          items:
            type: object
            required: [employeeId, employeeCode, employeeName, departmentName, designation, present, absent, late, halfDay, onLeave, attendanceRate, dailyStatuses]
            properties:
              employeeId: { type: integer }
              employeeCode: { type: string }
              employeeName: { type: string }
              departmentName: { type: string }
              designation: { type: string }
              present: { type: integer }
              absent: { type: integer }
              late: { type: integer }
              halfDay: { type: integer }
              onLeave: { type: integer }
              attendanceRate: { type: number }
              dailyStatuses:
                type: array
                items:
                  type: object
                  required: [date, status]
                  properties:
                    date: { type: string, format: date }
                    status: { $ref: "#/components/schemas/AttendanceStatus" }
                    hoursWorked: { type: number, nullable: true }

    AbsenteeismReport:
      type: object
      required: [month, workingDays, employees]
      properties:
        month: { type: string }
        workingDays: { type: integer }
        employees:
          type: array
          items:
            type: object
            required: [employeeId, employeeCode, employeeName, departmentName, designation, absentDays, lateDays, absenteeismRate]
            properties:
              employeeId: { type: integer }
              employeeCode: { type: string }
              employeeName: { type: string }
              departmentName: { type: string }
              designation: { type: string }
              absentDays: { type: integer }
              lateDays: { type: integer }
              absenteeismRate: { type: number }

    Form12Report:
      type: object
      required: [month, factoryName, workingDays, sundays, holidays, totalDays, employees]
      properties:
        month: { type: string }
        factoryName: { type: string }
        workingDays: { type: integer }
        sundays: { type: integer }
        holidays: { type: integer }
        totalDays: { type: integer }
        employees:
          type: array
          items:
            type: object
            required: [serial, employeeId, employeeCode, employeeName, daysWorked, sundaysWorked, holidaysWorked, totalDays]
            properties:
              serial: { type: integer }
              employeeId: { type: integer }
              employeeCode: { type: string }
              employeeName: { type: string }
              daysWorked: { type: number }
              sundaysWorked: { type: number }
              holidaysWorked: { type: number }
              totalDays: { type: number }
              deductionHours: { type: number, nullable: true }

    PayrollLine:
      type: object
      required: [employeeId, month, openingAdvance, advanceBank, advanceCash, hraElec, closingAdvance, balanceCheque]
      properties:
        employeeId: { type: integer }
        month: { type: string }
        openingAdvance: { type: number }
        advanceBank: { type: number }
        advanceCash: { type: number }
        hraElec: { type: number }
        closingAdvance: { type: number }
        balanceCheque: { type: number }
        notes: { type: string, nullable: true }

    UpdatePayrollLineBody:
      type: object
      required: [month]
      properties:
        month: { type: string, description: "YYYY-MM" }
        openingAdvance: { type: number, minimum: 0 }
        advanceBank: { type: number, minimum: 0 }
        advanceCash: { type: number, minimum: 0 }
        hraElec: { type: number, minimum: 0 }
        closingAdvance: { type: number, minimum: 0 }
        balanceCheque: { type: number }
        notes: { type: string, nullable: true }

    PayrollReport:
      type: object
      required: [month, workingDays, totals, employees]
      properties:
        month: { type: string }
        workingDays: { type: integer }
        totals:
          type: object
          required: [basicPayable, otAmount, totalPayable, deductions, finalPayable]
          properties:
            basicPayable: { type: number }
            otAmount: { type: number }
            totalPayable: { type: number }
            deductions: { type: number }
            finalPayable: { type: number }
        employees:
          type: array
          items: { $ref: "#/components/schemas/PayrollEmployeeRow" }

    PayrollEmployeeRow:
      type: object
      required: [serial, employeeId, employeeCode, employeeName, departmentName, monthlyWage, daysPresent, leaves, otHours, basicPayable, otAmount, totalPayable, openingAdvance, advanceBank, advanceCash, hraElec, pfAmount, esiAmount, deductions, closingAdvance, balanceCheque, finalPayable]
      properties:
        serial: { type: integer }
        employeeId: { type: integer }
        employeeCode: { type: string }
        employeeName: { type: string }
        departmentName: { type: string }
        monthlyWage: { type: number }
        statsEligible: { type: boolean }
        otEligible: { type: boolean }
        daysPresent: { type: number }
        leaves: { type: number }
        otHours: { type: number }
        basicPayable: { type: number }
        otAmount: { type: number }
        totalPayable: { type: number }
        openingAdvance: { type: number }
        advanceBank: { type: number }
        advanceCash: { type: number }
        hraElec: { type: number }
        pfAmount: { type: number }
        esiAmount: { type: number }
        deductions: { type: number }
        closingAdvance: { type: number }
        balanceCheque: { type: number }
        finalPayable: { type: number }

    DashboardSummary:
      type: object
      required: [totalEmployees, totalDepartments, todayPresent, todayAbsent, todayOnLeave, todayAttendanceRate, monthAttendanceRate, pendingLeaveRequests, overtimeHoursThisMonth]
      properties:
        totalEmployees: { type: integer }
        totalDepartments: { type: integer }
        todayPresent: { type: integer }
        todayAbsent: { type: integer }
        todayOnLeave: { type: integer }
        todayAttendanceRate: { type: number }
        monthAttendanceRate: { type: number }
        pendingLeaveRequests: { type: integer }
        overtimeHoursThisMonth: { type: number }
        recentActivity:
          type: array
          items:
            type: object
            required: [type, message, timestamp]
            properties:
              type: { type: string }
              message: { type: string }
              timestamp: { type: string, format: date-time }
